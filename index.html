<script>

function cleanId(value){

    if(value===undefined || value===null)
        return "";

    return String(value)
        .replace(".0","")
        .trim();
}

function safeMark(value){

    const num=parseFloat(value);

    return isNaN(num) ? 0 : num;
}

function readFile(file){

    return new Promise((resolve,reject)=>{

        const reader=new FileReader();

        reader.onload=e=>resolve(e.target.result);

        reader.onerror=reject;

        reader.readAsArrayBuffer(file);

    });
}

async function generateOutput(){

    const inputFile=
        document.getElementById("inputFile").files[0];

    const templateFile=
        document.getElementById("templateFile").files[0];

    if(!inputFile || !templateFile){

        alert("Please upload both files.");
        return;
    }

    const inputWB=
        XLSX.read(
            await readFile(inputFile)
        );

    const templateWB=
        XLSX.read(
            await readFile(templateFile)
        );

    const inputSheet=
        XLSX.utils.sheet_to_json(
            inputWB.Sheets[
                inputWB.SheetNames[0]
            ],
            {header:1}
        );

    const inputMap={};

    for(let r=1;r<inputSheet.length;r++){

        const row=inputSheet[r];

        const regNo=
            cleanId(row[2]); // C

        if(!regNo)
            continue;

        inputMap[regNo]={

            q1: safeMark(row[6]) * 0.4,
            q2: safeMark(row[7]) * 0.4,
            q3: safeMark(row[8]) * 0.4,
            q4: safeMark(row[9]) * 0.4,
            q5: safeMark(row[10]) * 0.4
        };
    }

    const sheet=
        templateWB.Sheets[
            templateWB.SheetNames[0]
        ];

    const rows=
        XLSX.utils.sheet_to_json(
            sheet,
            {header:1}
        );

    for(let r=4;r<rows.length;r++){

        const regNo=
            cleanId(
                rows[r][0]
            );

        if(!regNo)
            break;

        let q1=0;
        let q2=0;
        let q3=0;
        let q4=0;
        let q5=0;

        if(inputMap[regNo]){

            q1=inputMap[regNo].q1;
            q2=inputMap[regNo].q2;
            q3=inputMap[regNo].q3;
            q4=inputMap[regNo].q4;
            q5=inputMap[regNo].q5;
        }

        const total=
            q1+q2+q3+q4+q5;

        const excelRow=r+1;

        const values={

            F: total,
            G: q1,
            H: q2,
            I: q3,
            J: q4,
            K: q5
        };

        Object.keys(values).forEach(col=>{

            const cell=
                col + excelRow;

            const value=
                Math.round(
                    values[col] * 100
                ) / 100;

            if(sheet[cell]){

                sheet[cell].v=value;
                sheet[cell].t="n";

            }else{

                sheet[cell]={

                    t:"n",
                    v:value
                };
            }

        });

    }

    XLSX.writeFile(
        templateWB,
        "Final_SA_Marks.xlsx"
    );

    alert(
        "Output generated successfully."
    );
}

</script>
